version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smart_campaign
      POSTGRES_PASSWORD: smart_campaign_password
      POSTGRES_DB: smart_campaign_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_campaign -d smart_campaign_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

